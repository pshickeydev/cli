name: Auto Tag on Renovate Merge

on:
  pull_request:
    types: [closed]

permissions:
  contents: write
  actions: write

jobs:
  tag:
    if: github.event.pull_request.merged == true && startsWith(github.event.pull_request.head.ref, 'renovate/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Determine next fork version
        id: version
        run: |
          # Read the upstream base version from the CLI crate
          BASE=$(awk '/^\[package\]/{in_pkg=1} in_pkg && /^version = /{gsub(/"/, "", $3); print $3; exit}' crates/google-workspace-cli/Cargo.toml)
          # Strip any existing pre-release suffix to get the upstream base
          BASE=$(echo "$BASE" | sed 's/-.*//')

          # Find the latest fork tag for this base version
          LATEST=$(git tag --sort=-v:refname | grep -E "^v${BASE}-fork\.[0-9]+$" | head -1)

          if [ -z "$LATEST" ]; then
            FORK_NUM=1
          else
            FORK_NUM=$(echo "$LATEST" | sed "s/v${BASE}-fork\.//" )
            FORK_NUM=$((FORK_NUM + 1))
          fi

          NEW_VERSION="${BASE}-fork.${FORK_NUM}"
          echo "version=${NEW_VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=v${NEW_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Update version in source files
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          # Update [package] version in both crate Cargo.toml files
          for cargo_toml in crates/*/Cargo.toml; do
            tmp=$(mktemp)
            awk -v ver="$VERSION" '
              /^\[package\]/ { in_pkg=1 }
              /^\[/ && !/^\[package\]/ { in_pkg=0 }
              in_pkg && /^version = / { $0 = "version = \"" ver "\"" }
              { print }
            ' "$cargo_toml" > "$tmp" && mv "$tmp" "$cargo_toml"
          done

          # Update inter-crate dependency version
          sed -i -E "s/(google-workspace = \{ version = \")[^\"]+(\")/\1${VERSION}\2/" crates/google-workspace-cli/Cargo.toml

          # Update package.json version
          tmp=$(mktemp)
          jq --arg v "$VERSION" '.version = $v' package.json > "$tmp" && mv "$tmp" package.json

          # Regenerate Cargo.lock
          cargo generate-lockfile

      - name: Commit, tag, and push
        env:
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add crates/*/Cargo.toml package.json Cargo.lock
          git commit -m "chore: bump version to ${TAG#v}"
          git tag "$TAG"
          git push origin main "$TAG"

      - name: Trigger release workflow
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh workflow run release.yml \
            --field tag=${{ steps.version.outputs.tag }}
