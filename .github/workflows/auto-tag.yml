name: Auto Tag on Renovate Merge

on:
  pull_request:
    types: [closed]

permissions:
  contents: write

jobs:
  tag:
    if: github.event.pull_request.merged == true && startsWith(github.event.pull_request.head.ref, 'renovate/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get current version and bump patch
        id: version
        run: |
          latest=$(git tag --sort=-v:refname | grep -E '^v[0-9]' | head -1)
          if [ -z "$latest" ]; then
            echo "tag=v0.1.0" >> "$GITHUB_OUTPUT"
          else
            echo "$latest" | sed 's/v//' | awk -F. '{printf "tag=v%d.%d.%d\n", $1, $2, $3+1}' >> "$GITHUB_OUTPUT"
          fi

      - name: Create tag
        run: |
          git tag ${{ steps.version.outputs.tag }}
          git push origin ${{ steps.version.outputs.tag }}
